# First publish or any release when Trusted Publishing (OIDC) is not set up yet.
# Add repository secret NPM_TOKEN (npm granular access token with publish for this package).
#
# Run: Actions → "Release (npm token)" → Run workflow (pick branch, usually main).
# Does not trigger on git tags, so it will not run in parallel with release.yml on tag push.

name: Release (npm token)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm exec vp check
      - run: pnpm exec vp test
      - run: pnpm exec vp pack

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
