# Publishes to npm when you push a version tag (v*) or run the workflow manually.
#
# Preferred: npm Trusted Publishing (OIDC) — link this repo + workflow on the package
# at https://www.npmjs.com/package/@akshatowo/pdf-search/access (no NPM_TOKEN).
#
# Alternative: add repository secret NPM_TOKEN (granular publish token) and set on the
# publish step:
#   env:
#     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm exec vp check
      - run: pnpm exec vp test
      - run: pnpm exec vp pack

      - name: Publish to npm
        run: pnpm publish --access public --provenance --no-git-checks
