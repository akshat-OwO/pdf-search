# Publishes to npm when you push a version tag (v*) or run this workflow manually.
#
# Preferred after the package exists: npm Trusted Publishing (OIDC) — link this repo +
# this workflow on the package at npm → Access (no NPM_TOKEN).

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Node and npm for trusted publishing
        run: |
          node -v
          npm -v

      - run: pnpm exec vp check
      - run: pnpm exec vp test
      - run: pnpm exec vp pack

      - name: Publish to npm
        run: npm publish --access public
